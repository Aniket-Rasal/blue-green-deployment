version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
#  Monitoring Stack
#  - Prometheus  : metrics scraper            → http://localhost:9090
#  - Grafana     : dashboards & alerts        → http://localhost:3001
#  - cAdvisor    : container resource metrics → http://localhost:8080
# ─────────────────────────────────────────────────────────────────────────────

networks:
  app-network:
    external: true          # Joins the same network as the app containers
    name: blue-green-deployment_app-network

volumes:
  prometheus-data:
  grafana-data:

services:

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - app-network
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"          # allows hot reload via POST /-/reload

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - app-network
    depends_on:
      - prometheus

  # ── cAdvisor (container metrics) ────────────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: cadvisor
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - app-network
    privileged: true

  # ── Nginx Prometheus Exporter ────────────────────────────────────────────────
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:0.11.0
    container_name: nginx-exporter
    restart: unless-stopped
    command:
      - "-nginx.scrape-uri=http://nginx-proxy/nginx-status"
    ports:
      - "9113:9113"
    networks:
      - app-network
    depends_on:
      - prometheus
