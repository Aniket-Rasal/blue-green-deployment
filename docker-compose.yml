version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
#  Blue-Green Deployment — Docker Compose
#
#  Both blue AND green containers are always defined here.
#  Only ONE is exposed to Nginx at any time (controlled by nginx/active.conf).
#  The inactive container can be stopped to save resources, or left running
#  for instant rollback capability.
# ─────────────────────────────────────────────────────────────────────────────

networks:
  app-network:
    driver: bridge

services:

  # ── Nginx reverse proxy (traffic router) ───────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx:/etc/nginx/conf.d:ro          # blue.conf, green.conf, active.conf
      - nginx-logs:/var/log/nginx
    networks:
      - app-network
    depends_on:
      app-blue:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── BLUE container (v1 — current live) ─────────────────────────────────────
  app-blue:
    build:
      context: ./app/v1
      dockerfile: Dockerfile
    container_name: app-blue
    restart: unless-stopped
    environment:
      - PORT=3000
      - NODE_ENV=production
    networks:
      - app-network
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3
    labels:
      - "app.env=blue"
      - "app.version=1.0.0"

  # ── GREEN container (v2 — next version, idle until switched) ───────────────
  app-green:
    build:
      context: ./app/v2
      dockerfile: Dockerfile
    container_name: app-green
    restart: unless-stopped
    environment:
      - PORT=3000
      - NODE_ENV=production
    networks:
      - app-network
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3
    labels:
      - "app.env=green"
      - "app.version=2.0.0"
    # Green starts with no replicas — deploy script scales it up
    profiles:
      - green

volumes:
  nginx-logs:
